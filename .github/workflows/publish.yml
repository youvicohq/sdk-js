name: Publish

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Release bump"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    name: Version and publish packages
    runs-on: ubuntu-latest
    environment: Publish

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Verify lint did not modify files
        run: git diff --exit-code

      - name: Test
        run: pnpm test

      - name: Configure Git author
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"

      - name: Version with Lerna
        if: github.event_name == 'workflow_dispatch'
        run: pnpm exec lerna version "${{ inputs.bump }}"

      - name: Build
        run: pnpm build

      - name: Resolve release tag
        id: release
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="$(git describe --tags --abbrev=0 HEAD)"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Publish with Lerna
        run: pnpm exec lerna publish from-git

      - name: Push release commit and tag
        if: github.event_name == 'workflow_dispatch' && github.ref_type == 'branch'
        run: git push --follow-tags origin "HEAD:${GITHUB_REF_NAME}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.release.outputs.tag }}" \
            --title "${{ steps.release.outputs.tag }}" \
            --generate-notes \
            --latest \
            --verify-tag
