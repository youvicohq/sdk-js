name: Publish

on:
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write

jobs:
  npm:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify release tag
        run: |
          PACKAGE_VERSION="$(node -p "require('./packages/api/package.json').version")"
          RELEASE_TAG="${GITHUB_REF_NAME}"

          if [ "${RELEASE_TAG}" != "v${PACKAGE_VERSION}" ]; then
            echo "Release tag ${RELEASE_TAG} does not match package version v${PACKAGE_VERSION}."
            exit 1
          fi

      - name: Lint
        run: pnpm lint:api

      - name: Typecheck
        run: pnpm typecheck:api

      - name: Test
        run: pnpm test:api

      - name: Build
        run: pnpm build:api

      - name: Pack dry run
        run: pnpm pack:api

      - name: Publish
        run: npm publish
        working-directory: packages/api
